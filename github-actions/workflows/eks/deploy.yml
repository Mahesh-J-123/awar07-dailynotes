name: Deploy 2048 Game to EKS

on:
  push:
    branches: [main]

env:
  APP_NAME: 2048-game
  NAMESPACE: 2048-game
  AWS_REGION: ap-south-1
  EKS_CLUSTER: ekswithavinash

jobs:

  # ─────────────────────────────────────────────────────────────────
  # Deploy to EKS
  # ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest

    # Required for OIDC token generation
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # OIDC: GitHub proves its identity to AWS — no static keys needed
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Connect kubectl to your EKS cluster
      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ env.EKS_CLUSTER }} \
            --region ${{ env.AWS_REGION }}

      # Apply all manifests
      - name: Deploy to EKS
        run: |
          kubectl apply -f namespace.yaml
          kubectl apply -f deployment.yaml
          kubectl apply -f service.yaml

      # Wait for rollout — workflow fails if pods crash
      - name: Verify rollout
        run: |
          kubectl rollout status deployment/${{ env.APP_NAME }} \
            -n ${{ env.NAMESPACE }} \
            --timeout=120s

      # Always show pod state in logs (useful for debugging)
      - name: Show pod status
        if: always()
        run: |
          kubectl get pods -n ${{ env.NAMESPACE }} -o wide
